name: Deploy Business Web to VPS

on:
  push:
    branches: [main]

# Runs on a self-hosted runner installed ON the VPS (systemd service
# `actions.runner.blueducksltd-swiftrunbusinessweb.srv923762-business`, runs as
# root). The runner connects outbound to GitHub, so no inbound SSH is needed —
# this avoids the firewall dropping GitHub-hosted runner IPs on :22.
jobs:
  deploy:
    runs-on: [self-hosted, business-web]
    steps:
      - name: Build and restart business web
        run: |
          set -e
          cd /var/www/swiftrunbusinessweb
          git fetch origin main
          git reset --hard origin/main
          # The npm cache intermittently corrupts (OOM during build with no
          # swap); start clean every deploy and abort loudly if next is missing.
          rm -rf node_modules .next
          npm cache clean --force
          npm ci
          test -x node_modules/.bin/next || { echo "next binary missing after npm ci — aborting"; exit 1; }
          npm run build

          # Nginx config (idempotent)
          sudo cp nginx/business.swiftrunapp.com.conf /etc/nginx/sites-available/business.swiftrunapp.com
          sudo ln -sf /etc/nginx/sites-available/business.swiftrunapp.com /etc/nginx/sites-enabled/business.swiftrunapp.com
          sudo nginx -t && sudo systemctl reload nginx

          # Restart app
          pm2 restart swiftrun-business || pm2 start ecosystem.config.js
          pm2 save
